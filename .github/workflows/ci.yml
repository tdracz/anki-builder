name: CI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "tests/**"
      - "frontend/src/**"
      - "frontend/public/**"
      - "frontend/index.html"
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - "frontend/tsconfig*.json"
      - "frontend/vite.config.ts"
      - "frontend/eslint.config.js"
      - "requirements.txt"
      - "requirements-dev.txt"
      - "start.py"
      - "scrape.py"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "tests/**"
      - "frontend/src/**"
      - "frontend/public/**"
      - "frontend/index.html"
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - "frontend/tsconfig*.json"
      - "frontend/vite.config.ts"
      - "frontend/eslint.config.js"
      - "requirements.txt"
      - "requirements-dev.txt"
      - "start.py"
      - "scrape.py"
      - ".github/workflows/ci.yml"

jobs:
  backend:
    name: Backend tests (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest tests/ --cov=backend --cov-report=term-missing -v

  frontend:
    name: Frontend lint & build (Node)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
